<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Corazón</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}

canvas{
display:block;
}

#text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:40px;
text-align:center;
opacity:0;
transition:2s;
text-shadow:0 0 15px red;
}
</style>

</head>

<body>

<canvas id="c"></canvas>
<div id="text">Si tuviera que elegir otra vez,<br>te elegiría a ti ❤️</div>

<script>

const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let W=canvas.width;
let H=canvas.height;

let particles=[];

// 💖 forma correcta del corazón
function heart(t){
return {
x: 16*Math.pow(Math.sin(t),3),
y: -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))
};
}

// crear partículas bien distribuidas
for(let i=0;i<1200;i++){

let t=Math.random()*Math.PI*2;
let pos=heart(t);

particles.push({
x:Math.random()*W,
y:Math.random()*H,
tx:W/2 + pos.x*20,
ty:H/2 + pos.y*20
});

}

function draw(){

ctx.clearRect(0,0,W,H);

for(let p of particles){

p.x += (p.tx-p.x)*0.05;
p.y += (p.ty-p.y)*0.05;

ctx.beginPath();
ctx.fillStyle="red";
ctx.shadowColor="red";
ctx.shadowBlur=10;
ctx.arc(p.x,p.y,2,0,Math.PI*2);
ctx.fill();

}

requestAnimationFrame(draw);
}

draw();

// mostrar texto cuando termina
setTimeout(()=>{
document.getElementById("text").style.opacity=1;
},4000);

</script>

</body>
</html>
